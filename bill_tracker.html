  --orange-bg: #fef3c7;
  --orange-text: #92400e;
  --teal: #0891b2;
  --teal-bg: #ecfeff;
  --teal-text: #164e63;
  --amber: #b45309;
  --amber-bg: #fffbeb;

}
@media (prefers-color-scheme: dark) {
  :root {
    --text: #f0f0f0;
    --text-muted: #aaa;
    --bg: #111827;
    --bg-secondary: #1f2937;
    --border: #374151;

    --light-blue: #1e3a5f;
    --red-bg: #450a0a;

}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       font-size: 14px; background: var(--bg); color: var(--text); }
table { border-collapse: collapse; width: 100%; }
input, select, textarea { font-family: inherit; font-size: 12px;
  padding: 5px 8px; border: 1px solid var(--border);
  border-radius: 4px; background: var(--bg); color: var(--text); }
button { font-family: inherit; cursor: pointer; border: 1px solid var(--border);
  border-radius: 6px; padding: 5px 12px; background: var(--bg);
  color: var(--text); font-size: 12px; }
button:hover { background: var(--bg-secondary); }
a { color: var(--blue); text-decoration: none; }
a:hover { text-decoration: underline; }
@media print { .no-print { display: none !important; } tr { break-inside: avoid; } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

/* ── reusable components ───────────────────────── */
const Pill = ({ label, a, bg, t, sm }) => (
  <span style={{display:'inline-block',
    padding: sm ? '1px 7px' : '2px 9px',
    fontSize: sm ? 10 : 11, fontWeight: 500,
    borderRadius: 20, whiteSpace: 'nowrap',
    backgroundColor: bg, color: t,
    border: `1px solid ${a}30`}}>
    {label}
  </span>
);

const StatusDots = ({ status }) => {
  const idx = STAGES.indexOf(status);
  const dead = status === 'Dead';
  return (
    <div style={{display:'flex',alignItems:'center',gap:3}}>
      {STAGES.map((s, i) => (
        <React.Fragment key={s}>
          <div title={s} style={{width:8,height:8,borderRadius:'50%',flexShrink:0,
            backgroundColor: dead ? 'var(--red)' : i <= idx
              ? 'var(--green)' : 'var(--border)'}} />
          {i < STAGES.length - 1 &&
            <div style={{width:9,height:2,
              backgroundColor: !dead && i < idx
                ? 'var(--green)' : 'var(--border)'}} />}
        </React.Fragment>
      ))}
      <span style={{fontSize:10,color:'var(--text-muted)',
        marginLeft:4,whiteSpace:'nowrap'}}>
        {dead ? 'Dead' : status}
      </span>
    </div>
  );
};

/* ── BillRows component ────────────────────────── */
const BillRows = ({ bill: b, expanded, onToggle, editMode, onUpdate }) => {
  const c = CAT[b.category] || { bg:'var(--gray-bg)', t:'var(--text-muted)', a:'var(--mid-gray)' };
  const p = PARTY[b.party] || PARTY.R;
  const ch = CHAMBERS[b.chamber] || '?';
  const dt = b.introduced.slice(5).replace('-','/');
  const sel = expanded;

  const rowBase = {
    borderLeft: `4px solid ${c.a}`,
    cursor: 'pointer',
    backgroundColor: sel ? `${c.bg}` : 'var(--bg)',
    transition: 'background-color .15s',
  };

  return (
    <React.Fragment>
      {/* Row 1 — metadata */}
      <tr style={{...rowBase, borderBottom: sel ? 'none' : '1px solid var(--border)'}}
          onClick={() => onToggle(b.id)}>
        <td style={{padding:'7px 8px 7px 12px',fontSize:11,color:'var(--text-muted)',
          whiteSpace:'nowrap'}}>{dt}</td>
        <td style={{padding:'7px 8px'}}>
          <span style={{fontWeight:600,fontSize:13}}>{b.id}</span>
          <span style={{fontSize:12,marginLeft:6,color:'var(--text)'}}>{b.title}</span>
        </td>
        <td style={{padding:'7px 8px',fontSize:11,color:'var(--text-muted)'}}>{b.sponsor}</td>
        <td style={{padding:'7px 8px'}}>
          <Pill label={b.category} {...c} sm />
        </td>
        <td style={{padding:'7px 8px'}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}>
            <Pill label={b.party} {...p} sm />
            <span style={{fontSize:10,color:'var(--mid-gray)',fontWeight:500}}>{ch}</span>
          </span>
        </td>
        <td style={{padding:'7px 8px'}}><StatusDots status={b.status} /></td>
        <td style={{padding:'7px 8px',textAlign:'center',fontSize:12,color:'var(--mid-gray)'}}>
          {sel ? '▾' : '▸'}
        </td>
      </tr>

      {/* Row 2 — summary + teeth card */}
      <tr style={{...rowBase, borderBottom: expanded ? 'none' : '1px solid var(--border)'}}
          onClick={() => onToggle(b.id)}>
        <td />
        <td colSpan={5} style={{padding:'0 8px 8px'}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',
            borderRadius:6,overflow:'hidden',border:`1px solid ${c.a}20`,fontSize:12}}>
            <div style={{padding:'8px 12px',backgroundColor:`${c.bg}55`,lineHeight:1.5}}>
              <div style={{fontSize:10,fontWeight:600,color:c.t,marginBottom:3,
                textTransform:'uppercase',letterSpacing:'0.04em'}}>What it does</div>
              <div style={{color:'var(--text)'}}>{b.summary}</div>
            </div>
            <div style={{padding:'8px 12px',backgroundColor:'var(--bg-secondary)',
              borderLeft:`1px solid ${c.a}20`,lineHeight:1.5}}>
              <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',marginBottom:3,
                textTransform:'uppercase',letterSpacing:'0.04em'}}>Teeth / key detail</div>
              <div style={{color:'var(--text)'}}>{b.teeth}</div>
            </div>
          </div>
        </td>
        <td />
      </tr>

      {/* Row 3 — expanded detail + edit controls */}
      {expanded && (
        <tr style={{...rowBase, borderBottom:'1px solid var(--border)'}}>
          <td />
          <td colSpan={5} style={{padding:'0 8px 10px'}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr 1fr',gap:10,fontSize:12}}>
              <div style={{lineHeight:1.55}}>
                <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',marginBottom:3,
                  textTransform:'uppercase',letterSpacing:'0.04em'}}>Detail</div>
                <div style={{color:'var(--text)'}}>{b.detail}</div>
              </div>
              <div>
                <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',marginBottom:3,
                  textTransform:'uppercase',letterSpacing:'0.04em'}}>Info</div>
                <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.7}}>
                  Introduced: {b.introduced}<br/>
                  Chamber: {b.chamber}<br/>
                  Party: {b.party}
                </div>
              </div>
              {editMode && (
                <div style={{display:'flex',flexDirection:'column',gap:6}}>
                  <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',
                    textTransform:'uppercase',letterSpacing:'0.04em'}}>Edit</div>
                  <select value={b.status}
                    onChange={e => onUpdate(b.id, 'status', e.target.value)}>
                    {STAGES.map(s => <option key={s} value={s}>{s}</option>)}
                    <option value="Dead">Dead</option>
                  </select>
                  <input type="number" min={0} max={100} placeholder="P(pass) %"
                    value={b.pPass || ''}
                    onChange={e => onUpdate(b.id, 'pPass', e.target.value)} />
                  <textarea rows={2} placeholder="Notes..."
                    value={b.notes || ''}
                    onChange={e => onUpdate(b.id, 'notes', e.target.value)} />
                </div>
              )}
            </div>
          </td>
          <td />
        </tr>
      )}
    </React.Fragment>
  );
};

/* ── TimelineRow component ─────────────────────── */
const TimelineRow = ({ entry: e, expanded, onToggle, editMode, onUpdate }) => {
  const ag = AGENCY_META[e.agency] || { bg:'var(--gray-bg)', t:'var(--text-muted)', a:'var(--mid-gray)' };
  const ac = ACTION_META[e.action] || { bg:'var(--gray-bg)', t:'var(--text-muted)', a:'var(--mid-gray)' };
  const dt = e.date.slice(5).replace('-','/');

  const rowBase = {
    borderLeft: `4px solid ${ag.a}`,
    cursor: 'pointer',
    backgroundColor: expanded ? `${ag.bg}` : 'var(--bg)',
    transition: 'background-color .15s',
  };

  return (
    <React.Fragment>
      {/* Row 1 — metadata */}
      <tr style={{...rowBase, borderBottom: expanded ? 'none' : '1px solid var(--border)'}}
          onClick={() => onToggle(e.id)}>
        <td style={{padding:'7px 8px 7px 12px',fontSize:11,color:'var(--text-muted)',
          whiteSpace:'nowrap'}}>{dt}</td>
        <td style={{padding:'7px 8px'}}>
          <Pill label={e.agency} {...ag} sm />
        </td>
        <td style={{padding:'7px 8px'}}>
          <Pill label={e.action} {...ac} sm />
        </td>
        <td style={{padding:'7px 8px'}}>
          <span style={{fontWeight:500,fontSize:12,color:'var(--text)'}}>
            {e.title}
          </span>
          {e.isNew && (
            <span style={{marginLeft:6,fontSize:9,padding:'1px 6px',borderRadius:20,
              backgroundColor:'var(--red)',color:'#fff',fontWeight:600,
              verticalAlign:'middle'}}>NEW</span>
          )}
          <div style={{fontSize:11,color:'var(--text-muted)',marginTop:2,lineHeight:1.45}}>
            {e.detail.length > 120 && !expanded
              ? e.detail.slice(0, 120) + '…' : e.detail}
          </div>
        </td>
        <td style={{padding:'7px 8px',textAlign:'center',fontSize:12,color:'var(--mid-gray)'}}>
          {expanded ? '▾' : '▸'}
        </td>
      </tr>

      {/* Row 2 — expanded detail + edit */}
      {expanded && (
        <tr style={{...rowBase, borderBottom:'1px solid var(--border)'}}>
          <td />
          <td colSpan={3} style={{padding:'0 8px 10px'}}>
            <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:12,fontSize:12}}>
              <div style={{lineHeight:1.55}}>
                <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',marginBottom:3,
                  textTransform:'uppercase',letterSpacing:'0.04em'}}>Full detail</div>
                <div style={{color:'var(--text)'}}>{e.detail}</div>
              </div>
              <div>
                {editMode ? (
                  <div style={{display:'flex',flexDirection:'column',gap:6}}>
                    <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',
                      textTransform:'uppercase',letterSpacing:'0.04em'}}>Edit</div>
                    <select value={e.action}
                      onChange={ev => onUpdate(e.id, 'action', ev.target.value)}>
                      {Object.keys(ACTION_META).map(a =>
                        <option key={a} value={a}>{a}</option>)}
                    </select>
                    <textarea rows={2} placeholder="Notes..."
                      value={e.notes || ''}
                      onChange={ev => onUpdate(e.id, 'notes', ev.target.value)} />
                  </div>
                ) : (
                  <div>
                    <div style={{fontSize:10,fontWeight:600,color:'var(--text-muted)',marginBottom:3,
                      textTransform:'uppercase',letterSpacing:'0.04em'}}>Info</div>
                    <div style={{fontSize:11,color:'var(--text-muted)',lineHeight:1.7}}>
                      Date: {e.date}<br/>
                      Agency: {e.agency}<br/>
                      Action: {e.action}
                    </div>
                  </div>
                )}
              </div>
            </div>
          </td>
          <td />
        </tr>
      )}
    </React.Fragment>
  );
};

/* ── app ───────────────────────────────────────── */
const App = () => {
  const [activeTab, setActiveTab] = React.useState('bills');
  const [editMode, setEditMode] = React.useState(false);
  const [ts, setTs] = React.useState('March 31, 2026');
  const [bills, setBills] = React.useState(SEED_BILLS);
  const [timeline, setTimeline] = React.useState(SEED_TIMELINE);
  const [expandedBill, setExpandedBill] = React.useState(null);
  const [expandedTl, setExpandedTl] = React.useState(null);
  const [billFilter, setBillFilter] = React.useState({ cat:'all', party:'all', q:'' });
  const [tlFilter, setTlFilter] = React.useState({ agency:'all', action:'all', q:'' });

  const updateBill = (id, field, value) => {
    setBills(prev => prev.map(b => b.id === id ? { ...b, [field]: value } : b));
  };

  const updateTl = (id, field, value) => {
    setTimeline(prev => prev.map(e => e.id === id ? { ...e, [field]: value } : e));
  };

  const filteredTl = timeline.filter(e => {
    if (tlFilter.agency !== 'all' && e.agency !== tlFilter.agency) return false;
    if (tlFilter.action !== 'all' && e.action !== tlFilter.action) return false;
    if (tlFilter.q) {
      const q = tlFilter.q.toLowerCase();
      if (!`${e.title} ${e.detail} ${e.notes || ''}`
        .toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const filteredBills = bills.filter(b => {
    if (billFilter.cat !== 'all' && b.category !== billFilter.cat) return false;
    if (billFilter.party !== 'all' && b.party !== billFilter.party) return false;
    if (billFilter.q) {
      const q = billFilter.q.toLowerCase();
      if (!`${b.title} ${b.sponsor} ${b.summary} ${b.detail} ${b.teeth}`
        .toLowerCase().includes(q)) return false;
    }
    return true;
  });

  const billStats = activeTab === 'bills' ? [
    ['Total Bills', bills.length],
    ['Bipartisan', bills.filter(b => b.party === 'Bipartisan').length],
    ['In Committee', bills.filter(b => b.status === 'Committee').length],
    ['Floor Vote', bills.filter(b => b.status === 'Floor Vote').length],
    ['Introduced', bills.filter(b => b.status === 'Introduced').length],
  ] : [
    ['Total Actions', timeline.length],
    ['CFTC', timeline.filter(e => e.agency === 'CFTC').length],
    ['Fed', timeline.filter(e => e.agency === 'Fed').length],
    ['Enforcement', timeline.filter(e => e.action === 'Enforcement').length],
    ['Research', timeline.filter(e => e.action === 'Research').length],
  ];

  return (
    <div style={{minHeight:'100vh'}}>
      {/* NAV */}
      <div style={{backgroundColor:'var(--navy)',padding:'11px 16px',
        display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:11,color:'#93c5fd',letterSpacing:'0.05em',fontWeight:500}}>
            SPIA · VT
          </span>
          <span style={{color:'#374151'}}>|</span>
          <span style={{fontSize:14,fontWeight:500,color:'white'}}>
            Financial Regulation Tracker
          </span>
          <span style={{fontSize:10,padding:'2px 8px',borderRadius:20,
            backgroundColor:'#1d3a56',color:'#93c5fd',marginLeft:4}}>v1.0</span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:10,color:'#6b7280'}}>Updated: {ts}</span>
          <button onClick={() => setEditMode(e => !e)}
            style={{fontSize:11,padding:'3px 10px',borderRadius:20,
              backgroundColor: editMode ? '#dcfce7' : 'transparent',
              border: `1px solid ${editMode ? '#16a34a' : '#374151'}`,
              color: editMode ? '#14532d' : '#9ca3af'}}>
            {editMode ? 'editing on' : 'edit mode'}
          </button>
        </div>
      </div>

      {/* STATS BAR */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:1,
        backgroundColor:'var(--border)',marginBottom:0}}>
        {billStats.map(([label, val], i) =>
          <div key={i} style={{backgroundColor:'var(--bg-secondary)',
            padding:'8px 12px',textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--mid-gray)',marginBottom:2}}>{label}</div>
            <div style={{fontSize:20,fontWeight:500,
              color:'var(--text)',lineHeight:1}}>{val}</div>
          </div>
        )}
      </div>

      {/* TAB BAR */}
      <div style={{display:'flex',alignItems:'center',
        borderBottom:'1px solid var(--border)',
        backgroundColor:'var(--bg-secondary)',paddingLeft:14}}>
        {[['bills','Congressional Bills',bills.length],
          ['timeline','Regulatory Timeline',timeline.length]].map(([id,label,count]) =>
          <button key={id} onClick={() => setActiveTab(id)}
            style={{padding:'8px 18px',fontSize:12,fontWeight:500,
              cursor:'pointer',border:'none',
              borderBottom: activeTab===id
                ? '2px solid var(--navy)' : '2px solid transparent',
              backgroundColor:'transparent',
              color: activeTab===id ? 'var(--text)' : 'var(--text-muted)'}}>
            {label}{' '}
            <span style={{fontSize:10,padding:'1px 6px',borderRadius:20,marginLeft:3,
              backgroundColor: activeTab===id ? 'var(--navy)' : 'var(--gray-bg)',
              color: activeTab===id ? 'white' : 'var(--mid-gray)'}}>
              {count}
            </span>
          </button>
        )}
      </div>

      {/* BILLS TAB */}
      {activeTab === 'bills' && (
        <div>
          {/* Filter bar */}
          <div className="no-print" style={{backgroundColor:'var(--bg-secondary)',
            padding:'9px 14px',display:'flex',alignItems:'center',
            gap:8,flexWrap:'wrap',borderBottom:'1px solid var(--border)'}}>
            <input type="text" placeholder="Search bills..."
              value={billFilter.q}
              onChange={e => setBillFilter(f => ({...f, q: e.target.value}))}
              style={{width:170, borderRadius:20}} />
            <select value={billFilter.cat}
              onChange={e => setBillFilter(f => ({...f, cat: e.target.value}))}>
              <option value="all">All categories</option>
              {Object.keys(CAT).map(k =>
                <option key={k} value={k}>{k}</option>)}
            </select>
            <select value={billFilter.party}
              onChange={e => setBillFilter(f => ({...f, party: e.target.value}))}>
              <option value="all">All parties</option>
              <option value="D">Democrat</option>
              <option value="R">Republican</option>
              <option value="Bipartisan">Bipartisan only</option>
            </select>
            <div style={{marginLeft:'auto',display:'flex',gap:6}}>
              <button onClick={() => window.print()}>Print</button>
            </div>
          </div>

          {/* Bills table */}
          <div style={{overflowX:'auto'}}>
            <table style={{tableLayout:'fixed'}}>
              <colgroup>
                <col style={{width:56}} />
                <col />
                <col style={{width:155}} />
                <col style={{width:120}} />
                <col style={{width:90}} />
                <col style={{width:155}} />
                <col style={{width:26}} />
              </colgroup>
              <thead>
                <tr style={{backgroundColor:'var(--bg-secondary)',
                  borderBottom:'2px solid var(--border)'}}>
                  {['Date','Bill name','Sponsors','Category',
                    'Party / chamber','Status',''].map(h =>
                    <th key={h} style={{padding:'8px',textAlign:'left',fontSize:10,
                      fontWeight:500,color:'var(--mid-gray)',
                      textTransform:'uppercase',letterSpacing:'0.06em',
                      paddingLeft: h==='Date' ? 12 : 8}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {filteredBills.map(b =>
                  <BillRows key={b.id} bill={b}
                    expanded={expandedBill === b.id}
                    onToggle={id => setExpandedBill(p => p===id ? null : id)}
                    editMode={editMode}
                    onUpdate={updateBill} />
                )}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* TIMELINE TAB */}
      {activeTab === 'timeline' && (
        <div>
          {/* Filter bar */}
          <div className="no-print" style={{backgroundColor:'var(--bg-secondary)',
            padding:'9px 14px',display:'flex',alignItems:'center',
            gap:8,flexWrap:'wrap',borderBottom:'1px solid var(--border)'}}>
            <input type="text" placeholder="Search timeline..."
              value={tlFilter.q}
              onChange={e => setTlFilter(f => ({...f, q: e.target.value}))}
              style={{width:170, borderRadius:20}} />
            <select value={tlFilter.agency}
              onChange={e => setTlFilter(f => ({...f, agency: e.target.value}))}>
              <option value="all">All agencies</option>
              {Object.keys(AGENCY_META).map(k =>
                <option key={k} value={k}>{k}</option>)}
            </select>
            <select value={tlFilter.action}
              onChange={e => setTlFilter(f => ({...f, action: e.target.value}))}>
              <option value="all">All action types</option>
              {Object.keys(ACTION_META).map(k =>
                <option key={k} value={k}>{k}</option>)}
            </select>
            <div style={{marginLeft:'auto',display:'flex',gap:6}}>
              <button onClick={() => window.print()}>Print</button>
            </div>
          </div>

          {/* Timeline table */}
          <div style={{overflowX:'auto'}}>
            <table style={{tableLayout:'fixed'}}>
              <colgroup>
                <col style={{width:80}} />
                <col style={{width:90}} />
                <col style={{width:105}} />
                <col />
                <col style={{width:26}} />
              </colgroup>
              <thead>
                <tr style={{backgroundColor:'var(--bg-secondary)',
                  borderBottom:'2px solid var(--border)'}}>
                  {['Date','Agency','Action type','Title + summary',''].map(h =>
                    <th key={h} style={{padding:'8px',textAlign:'left',fontSize:10,
                      fontWeight:500,color:'var(--mid-gray)',
                      textTransform:'uppercase',letterSpacing:'0.06em',
                      paddingLeft: h==='Date' ? 12 : 8}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {filteredTl.map(e =>
                  <TimelineRow key={e.id} entry={e}
                    expanded={expandedTl === e.id}
                    onToggle={id => setExpandedTl(p => p===id ? null : id)}
                    editMode={editMode}
                    onUpdate={updateTl} />
                )}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',
        display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:4,
        marginTop:'auto'}}>
        <span style={{fontSize:11,color:'var(--mid-gray)'}}>
          David Bieri · SPIA · Virginia Tech
        </span>
        <span style={{fontSize:11,color:'var(--mid-gray)'}}>
          {activeTab === 'bills'
            ? `${filteredBills.length} of ${bills.length} bills shown`
            : `${filteredTl.length} of ${timeline.length} entries shown`}
        </span>
      </div>
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
