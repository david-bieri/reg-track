/* ── reusable components ───────────────────────── */
const Pill = ({ label, a, bg, t, sm }) => (
  <span style={{display:'inline-block',
    padding: sm ? '1px 7px' : '2px 9px',
    fontSize: sm ? 10 : 11, fontWeight: 500,
    borderRadius: 20, whiteSpace: 'nowrap',
    backgroundColor: bg, color: t,
    border: `1px solid ${a}30`}}>
    {label}
  </span>
);

const StatusDots = ({ status }) => {
  const idx = STAGES.indexOf(status);
  const dead = status === 'Dead';
  return (
    <div style={{display:'flex',alignItems:'center',gap:3}}>
      {STAGES.map((s, i) => (
        <React.Fragment key={s}>
          <div title={s} style={{width:8,height:8,borderRadius:'50%',flexShrink:0,
            backgroundColor: dead ? 'var(--red)' : i <= idx
              ? 'var(--green)' : 'var(--border)'}} />
          {i < STAGES.length - 1 &&
            <div style={{width:9,height:2,
              backgroundColor: !dead && i < idx
                ? 'var(--green)' : 'var(--border)'}} />}
        </React.Fragment>
      ))}
      <span style={{fontSize:10,color:'var(--text-muted)',
        marginLeft:4,whiteSpace:'nowrap'}}>
        {dead ? 'Dead' : status}
      </span>
    </div>
  );
};

        <td style={{padding:'7px 8px'}}>
          <span style={{display:'flex',alignItems:'center',gap:4}}>
            <Pill label={b.party} {...p} sm />

/* ── SignalAnalytics component ─────────────────── */
const SignalAnalytics = ({ signals }) => {
  const total = signals.length;
  if (total === 0) return (
    <div style={{padding:'20px',textAlign:'center',color:'var(--text-muted)',fontSize:12}}>
      No data to analyze — add signal entries to see analytics.
    </div>
  );

  /* ── 1. Weekly intensity — last 8 weeks ── */
  const now = new Date();
  const getWeekKey = d => {
    const dt = new Date(d);
    // Monday-start ISO week label "MM/DD"
    const day = dt.getDay(); const diff = (day===0?-6:1)-day;
    const mon = new Date(dt); mon.setDate(dt.getDate()+diff);
    return `${mon.getMonth()+1}/${mon.getDate()}`;
  };
  const weeks = [];
  for (let w = 7; w >= 0; w--) {
    const d = new Date(now); d.setDate(now.getDate() - w*7);
    weeks.push(getWeekKey(d.toISOString().slice(0,10)));
  }
  const weekData = weeks.map(wk => {
    const inWeek = signals.filter(s => getWeekKey(s.date) === wk);
    return {
      wk,
      H: inWeek.filter(s=>s.significance==='High').length,
      M: inWeek.filter(s=>s.significance==='Medium').length,
      L: inWeek.filter(s=>s.significance==='Low').length,
      total: inWeek.length,
      intensity: inWeek.reduce((acc,s)=> acc + (s.significance==='High'?3:s.significance==='Medium'?2:1), 0),
    };
  });
  const maxIntensity = Math.max(...weekData.map(w=>w.intensity), 1);

  /* ── 2. Sector activity ── */
  const sectorCounts = Object.keys(SECTOR_META).map(sec => {
    const items = signals.filter(s=>s.sector===sec);
    const latest = items.length ? items.sort((a,b)=>b.date.localeCompare(a.date))[0].date : null;
    const daysSince = latest ? Math.floor((now-new Date(latest))/(1000*60*60*24)) : null;
    return { sec, count: items.length,
      weighted: items.reduce((a,s)=>a+(s.significance==='High'?3:s.significance==='Medium'?2:1),0),
      daysSince, color: SECTOR_META[sec].a };
  }).filter(s=>s.count>0).sort((a,b)=>b.weighted-a.weighted);
  const maxW = Math.max(...sectorCounts.map(s=>s.weighted), 1);

  /* ── 3. Source concentration ── */
  const srcMap = {};
  signals.forEach(s => { srcMap[s.source] = (srcMap[s.source]||0)+1; });
  const srcList = Object.entries(srcMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxSrc = srcList[0]?.[1] || 1;

  /* ── 4. Significance distribution ── */
  const hCount = signals.filter(s=>s.significance==='High').length;
  const mCount = signals.filter(s=>s.significance==='Medium').length;
  const lCount = signals.filter(s=>s.significance==='Low').length;
  const hPct = Math.round(hCount/total*100);
  const mPct = Math.round(mCount/total*100);
  const lPct = 100-hPct-mPct;

  // Simple SVG donut
  const donutSlices = (r=36, cx=50, cy=50) => {
    const data = [{v:hCount,color:'var(--red)'},{v:mCount,color:'var(--orange)'},{v:lCount,color:'var(--mid-gray)'}];
    let start = -Math.PI/2;
    return data.filter(d=>d.v>0).map(d => {
      const angle = (d.v/total)*2*Math.PI;
      const end = start+angle;
      const x1=cx+r*Math.cos(start), y1=cy+r*Math.sin(start);
      const x2=cx+r*Math.cos(end),   y2=cy+r*Math.sin(end);
      const large = angle>Math.PI?1:0;
      const path = `M${cx},${cy} L${x1},${y1} A${r},${r},0,${large},1,${x2},${y2} Z`;
      start=end;
      return <path key={d.color} d={path} fill={d.color} opacity={0.75}/>;
    });
  };

  const panelStyle = {
    backgroundColor:'var(--bg-secondary)',
    border:'1px solid var(--border)',
    borderRadius:6, padding:'12px 14px',
  };
  const headStyle = {
    fontSize:10,fontWeight:600,color:'var(--text-muted)',
    textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:10,
  };

  return (
    <div style={{padding:'12px 14px',borderBottom:'1px solid var(--border)',
      backgroundColor:'var(--bg)'}}>
      <div style={{display:'grid',gridTemplateColumns:'2fr 1.3fr 1fr 1fr',gap:10}}>

        {/* Panel 1 — Weekly Intensity */}
        <div style={panelStyle}>
          <div style={headStyle}>Weekly intensity · 8-week window</div>
          <svg viewBox="0 0 280 90" style={{width:'100%',height:90,overflow:'visible'}}>
            {weekData.map((w,i) => {
              const bw = 24, gap = 11, x = i*(bw+gap)+4;
              const barH = maxIntensity>0 ? (w.intensity/maxIntensity)*62 : 0;
              // Stacked segments proportional to H/M/L within bar
              const hH = w.total>0 ? (w.H/w.total)*barH : 0;
              const mH = w.total>0 ? (w.M/w.total)*barH : 0;
              const lH = barH - hH - mH;
              const base = 72;
              return (
                <g key={w.wk}>
                  {lH>0&&<rect x={x} y={base-lH} width={bw} height={lH} fill="var(--mid-gray)" opacity={0.4} rx={1}/>}
                  {mH>0&&<rect x={x} y={base-lH-mH} width={bw} height={mH} fill="var(--orange)" opacity={0.7} rx={1}/>}
                  {hH>0&&<rect x={x} y={base-barH} width={bw} height={hH} fill="var(--red)" opacity={0.75} rx={1}/>}
                  {barH===0&&<rect x={x} y={base-2} width={bw} height={2} fill="var(--border)" rx={1}/>}
                  <text x={x+bw/2} y={84} textAnchor="middle" fontSize={7} fill="var(--text-muted)">{w.wk}</text>
                  {w.total>0&&<text x={x+bw/2} y={base-barH-4} textAnchor="middle" fontSize={8} fontWeight="500" fill="var(--text)">{w.total}</text>}
                </g>
              );
            })}
            {/* Legend */}
            {[['H','var(--red)',0.75],['M','var(--orange)',0.7],['L','var(--mid-gray)',0.4]].map(([l,c,o],i)=>(
              <g key={l} transform={`translate(${252+i*0},${i*12})`}>
                <rect x={0} y={-7} width={7} height={7} fill={c} opacity={o} rx={1}/>
                <text x={9} y={0} fontSize={7} fill="var(--text-muted)">{l}</text>
              </g>
            ))}
          </svg>
        </div>

        {/* Panel 2 — Sector Activity */}
        <div style={panelStyle}>
          <div style={headStyle}>Sector activity</div>
          <div style={{display:'flex',flexDirection:'column',gap:5}}>
            {sectorCounts.slice(0,6).map(s => (
              <div key={s.sec} style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{width:72,fontSize:9,color:'var(--text-muted)',
                  whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',flexShrink:0}}>
                  {s.sec.replace(' / ','/').replace(' Protection','Prot.')}
                </div>
                <div style={{flex:1,height:8,backgroundColor:'var(--border)',borderRadius:4,overflow:'hidden'}}>
                  <div style={{height:'100%',borderRadius:4,
                    width:`${(s.weighted/maxW)*100}%`,backgroundColor:s.color,opacity:0.8}}/>
                </div>
                <div style={{fontSize:9,fontWeight:600,color:'var(--text)',width:14,textAlign:'right',flexShrink:0}}>
                  {s.count}
                </div>
                <div style={{fontSize:8,color:'var(--text-muted)',width:30,textAlign:'right',flexShrink:0}}>
                  {s.daysSince===0?'today':s.daysSince===1?'1d ago':s.daysSince!=null?`${s.daysSince}d`:'—'}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Panel 3 — Source Concentration */}
        <div style={panelStyle}>
          <div style={headStyle}>Source concentration</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {srcList.map(([src,cnt],i) => (
              <div key={src} style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{fontSize:9,color:'var(--text-muted)',width:16,flexShrink:0,fontWeight:500}}>
                  {i+1}.
                </div>
                <div style={{flex:1,fontSize:9,color:'var(--text)',
                  whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                  {src||'—'}
                </div>
                <div style={{height:6,width:`${(cnt/maxSrc)*48}px`,
                  backgroundColor:'var(--blue)',opacity:0.6,borderRadius:3,flexShrink:0}}/>
                <div style={{fontSize:9,fontWeight:600,color:'var(--text)',
                  width:14,textAlign:'right',flexShrink:0}}>
                  {cnt}
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Panel 4 — Significance Distribution */}
        <div style={{...panelStyle,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:10}}>
          <div style={{...headStyle,marginBottom:2}}>Significance</div>
          <svg viewBox="0 0 100 100" style={{width:72,height:72}}>
            {donutSlices()}
            <circle cx={50} cy={50} r={22} fill="var(--bg-secondary)"/>
            <text x={50} y={54} textAnchor="middle" fontSize={16} fontWeight="600" fill="var(--text)">{total}</text>
          </svg>
          <div style={{display:'flex',flexDirection:'column',gap:4,width:'100%'}}>
            {[['High','var(--red)',hCount,hPct],['Medium','var(--orange)',mCount,mPct],['Low','var(--mid-gray)',lCount,lPct]].map(([l,c,n,p])=>(
              <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
                <div style={{width:7,height:7,borderRadius:2,backgroundColor:c,opacity:0.8,flexShrink:0}}/>
                <div style={{fontSize:9,color:'var(--text-muted)',flex:1}}>{l}</div>
                <div style={{fontSize:9,fontWeight:600,color:'var(--text)'}}>{n}</div>
                <div style={{fontSize:8,color:'var(--text-muted)',width:24,textAlign:'right'}}>{p}%</div>
              </div>
            ))}
          </div>
        </div>

      </div>
    </div>
  );
};

const STORAGE_KEY    = 'reg-track-v1';
const API_KEY_STORE  = 'reg-track-apikey';

function getApiKey() {
  try { return localStorage.getItem(API_KEY_STORE) || ''; }
  catch(e) { return ''; }
}
function saveApiKey(k) {

}
function clearApiKey() {

}

/* ── URL helpers ───────────────────────────────── */
const UNINDEXABLE_HOSTS = [
  'govdelivery.com','content.govdelivery.com',
  'mailchi.mp','list-manage.com','us*.list-manage.com',
  'substack.com/email','buttondown.email',
  'campaign-archive.com','mailerlite.com',
];
const PAYWALL_HOSTS = [
  'americanbanker.com','wsj.com','ft.com',
  'bloomberg.com','reuters.com/plus',
];

function classifyUrl(url) {
  if (!url.startsWith('http')) return 'text';
  try {
    const host = new URL(url).hostname.replace(/^www\./,'');
    if (UNINDEXABLE_HOSTS.some(h => host.includes(h.replace(/\*/,'')))) return 'unindexable';
    if (PAYWALL_HOSTS.some(h => host.includes(h))) return 'paywall';
    return 'url';
  } catch(e) { return 'text'; }
}

/* ── Robust JSON extractor — balanced brace walker ── */
function extractJson(text) {
  const s = text.replace(/```json\s*/gi,'').replace(/```\s*/g,'');
  for (let i = 0; i < s.length; i++) {
    if (s[i] !== '{') continue;
    let depth = 0, j = i;
    while (j < s.length) {
      if (s[j] === '{') depth++;
      else if (s[j] === '}') { depth--; if (depth === 0) break; }
      j++;
    }
    if (depth === 0) {
      const candidate = s.slice(i, j + 1);
      // Pass 1 — direct parse
      try {
        const p = JSON.parse(candidate);
        if (p && typeof p === 'object' && Object.keys(p).length > 1) return p;
      } catch(e) {}
      // Pass 2 — remove trailing commas
      try {
        const p = JSON.parse(candidate.replace(/,(\s*[}\]])/g,'$1'));
        if (p && typeof p === 'object' && Object.keys(p).length > 1) return p;
      } catch(e) {}
      // Pass 3 — replace unescaped " inside string values with '
      try {
        // Replace "value" content: any " that isn't a key/value delimiter
        const repaired = candidate.replace(
          /("(?:date|source|sourceType|title|summary|detail|sector|significance|url)"\s*:\s*")([^"]*?)(?="(?:\s*[,}]))/g,
          (_, key, val) => key + val.replace(/"/g, "'")
        );
        const p = JSON.parse(repaired);
        if (p && typeof p === 'object' && Object.keys(p).length > 1) return p;
      } catch(e) {}
    }
  }
  return null;
}

function extractJsonArray(text) {
  const s = text.replace(/```json\s*/gi,'').replace(/```\s*/g,'');
  for (let i = 0; i < s.length; i++) {
    if (s[i] !== '[') continue;
    let depth = 0, j = i;
    while (j < s.length) {
      if (s[j] === '[') depth++;
      else if (s[j] === ']') { depth--; if (depth === 0) break; }
      j++;
    }
    if (depth === 0) {
      try {
        const arr = JSON.parse(s.slice(i, j + 1));
        if (Array.isArray(arr)) return arr;
      } catch(e) { continue; }
    }
  }
  return null;
}

          {/* Analytics strip */}
          {showSigAnalytics && <SignalAnalytics signals={filteredSignals} />}

          {/* Cards feed */}
          <div style={{maxWidth:'100%'}}>
            {filteredSignals.length === 0 ? (
              <div style={{padding:'40px 20px',textAlign:'center',color:'var(--text-muted)',fontSize:13}}>
                No signal entries match your filters.
              </div>
            ) : filteredSignals.map(s =>
              <SignalCard key={s.id} sig={s}
                expanded={expandedSig === s.id}
                onToggle={id => setExpandedSig(p => p===id ? null : id)}
                editMode={editMode}
                onUpdate={updateSig} />
            )}
          </div>
        </div>
      )}

      {/* FOOTER */}
      <div style={{padding:'10px 14px',borderTop:'1px solid var(--border)',
        display:'flex',justifyContent:'space-between',flexWrap:'wrap',gap:4,
        marginTop:'auto'}}>
        <span style={{fontSize:11,color:'var(--mid-gray)'}}>
          David Bieri · SPIA · Virginia Tech
        </span>
        <span style={{fontSize:11,color:'var(--mid-gray)'}}>
          {activeTab === 'bills'
            ? `${filteredBills.length} of ${bills.length} bills shown`
            : activeTab === 'timeline'
            ? `${filteredTl.length} of ${timeline.length} entries shown`
            : `${filteredSignals.length} of ${signals.length} signals shown`}
        </span>
      </div>

      {/* ADD BILL MODAL */}
      {showAddModal && (
        <AddBillModal
          step={addStep}
          seed={addSeed}
          onSeedChange={setAddSeed}
          onFetch={doFetchBill}
          onManual={doManualBill}
          draft={addDraft}
          onDraftChange={(key, val) => setAddDraft(d => ({...d, [key]: val}))}
          onConfirm={doConfirmBill}
          onClose={closeAddModal}
          error={addError}
        />
      )}

      {/* ADD ENTRY MODAL */}
      {showAddEntryModal && (
        <AddEntryModal
          step={addEntryStep}
          seed={addEntrySeed}
          onSeedChange={setAddEntrySeed}
          onFetch={doFetchEntry}
          onManual={doManualEntry}
          draft={addEntryDraft}
          onDraftChange={(key, val) => setAddEntryDraft(d => ({...d, [key]: val}))}
          onConfirm={doConfirmEntry}
          onClose={closeAddEntryModal}
          error={addEntryError}
        />
      )}
      {/* ADD SIGNAL MODAL */}
      {showAddSigModal && (
        <AddSignalModal
          step={addSigStep}
          seed={addSigSeed}
          onSeedChange={setAddSigSeed}
          onFetch={doFetchSignal}
          onManual={doManualSignal}
          draft={addSigDraft}
          onDraftChange={(key,val) => setAddSigDraft(d => ({...d, [key]:val}))}
          onConfirm={doConfirmSignal}
          onClose={closeAddSigModal}
          error={addSigError}
        />
      )}
    </div>
  );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
